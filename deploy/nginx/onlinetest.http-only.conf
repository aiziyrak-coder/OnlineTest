        proxy_read_timeout 120s;
    }

    location /static/ {
        alias /var/www/onlinetest/backend/staticfiles/;
        access_log off;
        expires 7d;
    }

    location = /favicon.ico {
        access_log off;
        log_not_found off;
        return 204;
    }

    location = / {
        return 302 $scheme://$host/api/health;
    }

    location / {
        return 404;
    }
}
