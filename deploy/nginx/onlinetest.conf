# FJSTI OnlineTest — faqat quyidagi server_name lar.
# MUHIM: default_server YO‘Q — shu sababli boshqa domenlar boshqa vhost orqali ishlayveradi.
#
# Sertifikat: ikkala domen bitta lineage da (certbot birinchi domen nomi bilan papka).
#   sudo certbot certonly --webroot -w /var/www/html -d online-imtixon.uz -d api.online-imtixon.uz
# yoki: sudo bash deploy/https-certbot.sh online-imtixon.uz api.online-imtixon.uz
#
# Agar sertifikat yo‘li boshqacha bo‘lsa — ssl_certificate / ssl_certificate_key ni moslang.

# --- Port 80: faqat ACME + HTTPS ga yo‘naltirish (boshqa server_name larga aralashmaydi) ---
server {
    listen 80;
    listen [::]:80;
    server_name online-imtixon.uz api.online-imtixon.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# === HTTPS: Frontend ===
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name online-imtixon.uz;

    ssl_certificate     /etc/letsencrypt/live/online-imtixon.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/online-imtixon.uz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /var/www/onlinetest/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /healthz {
        default_type text/plain;
        return 200 "ok\n";
    }
}

# === HTTPS: API + WebSocket ===
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.online-imtixon.uz;

    ssl_certificate     /etc/letsencrypt/live/online-imtixon.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/online-imtixon.uz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 55m;

    location = /__internal_deploy/v1 {
        limit_except POST { deny all; }
        proxy_pass http://127.0.0.1:9085;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_connect_timeout 15s;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:9082;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location /api/ {
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Expose-Headers;
        add_header Access-Control-Allow-Origin "https://online-imtixon.uz" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Expose-Headers "X-Total-Count, X-Request-Id" always;
        if ($request_method = OPTIONS) {
            return 204;
        }
        proxy_pass http://127.0.0.1:9081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 900s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 900s;
    }

    location = /admin {
        return 301 $scheme://$host/admin/;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:9081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 120s;
    }

    location /static/ {
        alias /var/www/onlinetest/backend/staticfiles/;
        access_log off;
        expires 7d;
    }

    location = /favicon.ico {
        access_log off;
        log_not_found off;
        return 204;
    }

    location = / {
        return 302 $scheme://$host/api/health;
    }

    location / {
        return 404;
    }
}
