# FJSTI OnlineTest — faqat quyidagi server_name lar uchun.
# O‘rnatish: sudo bash deploy/enable-nginx-onlinetest.sh
# HTTPS (2 domen): sudo bash deploy/https-certbot.sh <frontend_domen> <api_domen>
#    yoki: certbot --nginx -d onlinetest.ziyrak.org -d onlinetestapi.ziyrak.org
# Boshqa domen bo‘lsa — ikkala server_name ni bu faylda almashtirib, keyin certbot.
#
# Deploy hook uchun qo‘shimcha himoya (ixtiyoriy): nginx.conf http {} ichida
#   limit_req_zone $binary_remote_addr zone=onlinetest_deploy:10m rate=6r/m;
# va shu faylda __internal_deploy location ga: limit_req zone=onlinetest_deploy burst=2 nodelay;

# === Frontend: onlinetest.ziyrak.org ===
server {
    listen 80;
    listen [::]:80;
    server_name onlinetest.ziyrak.org;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /var/www/onlinetest/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /healthz {
        default_type text/plain;
        return 200 "ok\n";
    }
}

# === API + WebSocket: onlinetestapi.ziyrak.org ===
# Ichki portlar: Gunicorn 9081, Node realtime 9082 — band bo‘lsa deploy/env va systemd ni o‘zgartiring
server {
    listen 80;
    listen [::]:80;
    server_name onlinetestapi.ziyrak.org;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 55m;

    # GitHub Actions: SSH kalitsiz deploy (maxfiy X-Deploy-Secret)
    location = /__internal_deploy/v1 {
        limit_except POST { deny all; }
        proxy_pass http://127.0.0.1:9085;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_connect_timeout 15s;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:9082;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location /api/ {
        # CORS (frontend -> api)
        add_header Access-Control-Allow-Origin "https://onlinetest.ziyrak.org" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials "true" always;
        if ($request_method = OPTIONS) {
            return 204;
        }
        proxy_pass http://127.0.0.1:9081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # JWT: ba'zi nginx sozlamalarida Authorization uzatilmasligi 401/403 ga olib keladi
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 900s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 900s;
    }

    location = /admin {
        return 301 $scheme://$host/admin/;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:9081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 120s;
    }

    location /static/ {
        alias /var/www/onlinetest/backend/staticfiles/;
        access_log off;
        expires 7d;
    }

    # Brauzer ildiz va favicon — avvalgi return 404 konsol xatosi berardi
    location = /favicon.ico {
        access_log off;
        log_not_found off;
        return 204;
    }

    location = / {
        return 302 $scheme://$host/api/health;
    }

    location / {
        return 404;
    }
}
