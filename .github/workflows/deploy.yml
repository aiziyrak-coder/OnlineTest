# CI muvaffaqiyatidan keyin deploy.
# Variant A — SSH (kalit yoki parol). Variant B — webhook (SSH shart emas).
# Bir vaqtning o‘zida faqat bittasini ishlating: webhook bo‘lsa SSH_HOST qo‘ymang.
name: Deploy to server

on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-onlinetest
  cancel-in-progress: true

jobs:
  deploy-webhook:
    name: Webhook deploy (SSH kalitsiz)
    runs-on: ubuntu-latest
    if: >-
      secrets.DEPLOY_HOOK_URL != '' && secrets.DEPLOY_HOOK_SECRET != '' &&
      (github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'))
    steps:
      - name: POST deploy hook
        run: |
          curl -fsS --max-time 600 -X POST \
            -H "X-Deploy-Secret: ${{ secrets.DEPLOY_HOOK_SECRET }}" \
            "${{ secrets.DEPLOY_HOOK_URL }}"

  deploy-ssh:
    name: SSH deploy
    runs-on: ubuntu-latest
    if: >-
      secrets.DEPLOY_HOOK_URL == '' &&
      secrets.SSH_HOST != '' && secrets.SSH_USERNAME != '' &&
      (secrets.SSH_PRIVATE_KEY != '' || secrets.SSH_PASSWORD != '') &&
      (github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'))
    steps:
      - name: Pull, build, restart on droplet
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          password: ${{ secrets.SSH_PASSWORD }}
          script_stop: true
          script: |
            set -euo pipefail
            APP="${{ secrets.SSH_APP_PATH }}"
            cd "${APP:-/var/www/onlinetest}"
            git fetch origin main
            git reset --hard origin/main
            if [[ ! -L /etc/nginx/sites-enabled/fjsti-onlinetest.conf ]]; then
              sudo bash deploy/enable-nginx-onlinetest.sh
            fi
            bash deploy/remote-update.sh --no-git
