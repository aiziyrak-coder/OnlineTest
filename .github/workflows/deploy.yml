# CI muvaffaqiyatidan keyin avtomatik: serverda git pull + build + restart.
# Bir marta Secret: deploy/SETUP-SECRETS-ONCE.md
name: Deploy to server

on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-onlinetest
  cancel-in-progress: true

jobs:
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest
    if: >-
      secrets.SSH_HOST != '' && secrets.SSH_USERNAME != '' &&
      (secrets.SSH_PRIVATE_KEY != '' || secrets.SSH_PASSWORD != '') &&
      (github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'))
    steps:
      - name: Pull, build, restart on droplet
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          password: ${{ secrets.SSH_PASSWORD }}
          script_stop: true
          script: |
            set -euo pipefail
            APP="${{ secrets.SSH_APP_PATH }}"
            cd "${APP:-/var/www/onlinetest}"
            git pull origin main
            if [[ ! -L /etc/nginx/sites-enabled/fjsti-onlinetest.conf ]]; then
              sudo bash deploy/enable-nginx-onlinetest.sh
            fi
            bash deploy/remote-update.sh --no-git
