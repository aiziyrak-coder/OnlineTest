name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=moderate

      - name: Typecheck
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build
        env:
          NODE_ENV: production

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: pip-audit (dependencies)
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

      - name: Byte-compile
        run: python -m compileall -q apps exam_platform manage.py

      - name: Django check
        env:
          DJANGO_SECRET_KEY: ci-django-secret-key-at-least-40-characters-long-x
          DJANGO_DEBUG: "1"
          JWT_SECRET: ci-placeholder-jwt-secret-min-24-chars-long
        run: python manage.py check

      - name: Django check --deploy (prod-like)
        env:
          DJANGO_SECRET_KEY: ci-django-secret-key-at-least-40-characters-long-x
          DJANGO_DEBUG: "0"
          JWT_SECRET: ci-placeholder-jwt-secret-min-24-chars-long
          ALLOWED_HOSTS: api.example.org,127.0.0.1
          CORS_ALLOWED_ORIGINS: https://app.example.org
          CSRF_TRUSTED_ORIGINS: https://app.example.org,https://api.example.org
          SECURE_PROXY_SSL_HEADER: X-Forwarded-Proto:https
        run: python manage.py check --deploy

      - name: Tests
        env:
          DJANGO_SECRET_KEY: ci-django-secret-key-at-least-40-characters-long-x
          DJANGO_DEBUG: "1"
          JWT_SECRET: ci-placeholder-jwt-secret-min-24-chars-long
        run: python manage.py test apps.api.tests -v 1

  realtime-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root deps (socket.io)
        run: npm ci

      - name: Deploy hook syntax
        run: node --check deploy/deploy-hook.mjs

      - name: Start realtime server
        run: |
          node backend/realtime/server.mjs &
          sleep 2
          curl -sf http://127.0.0.1:3001/healthz | grep -q ok
