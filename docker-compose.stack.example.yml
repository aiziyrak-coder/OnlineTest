# Misol: `docker compose -f docker-compose.stack.example.yml up --build`
# Parollarni o‘zgartiring; DATABASE_URL ni .env fayl bilan berish tavsiya etiladi.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: exam
      POSTGRES_PASSWORD: change_me_in_prod
      POSTGRES_DB: exam
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exam -d exam"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DJANGO_DEBUG: "0"
      DJANGO_SECRET_KEY: replace_with_40_plus_random_chars_minimum_length_secret
      JWT_SECRET: replace_with_jwt_secret_min_24_chars
      ALLOWED_HOSTS: localhost,127.0.0.1,api
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      CSRF_TRUSTED_ORIGINS: http://localhost:5173
      DATABASE_URL: postgres://exam:change_me_in_prod@db:5432/exam
      DB_CONN_MAX_AGE: "60"
      TRUST_X_FORWARDED_HOST: "0"
      APP_BUILD_REF: docker-compose-example
      GUNICORN_BIND: 0.0.0.0:8000
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/live', timeout=3).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  pgdata:
